name: Tests (Linux)

# Push to main + manual run only — no per-PR / per-branch costs.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel previous runs of this workflow on the same ref when a new push lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }} on Ubuntu
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    env:
      # Force Qt to use the offscreen platform plugin so PyQt6 can run
      # without a display. xvfb-run is also installed as a fallback for
      # tests that explicitly need a virtual X server.
      QT_QPA_PLATFORM: offscreen
      # Suppress Qt's "QStandardPaths: XDG_RUNTIME_DIR not set" warnings.
      XDG_RUNTIME_DIR: /tmp/runtime-runner
      # Make Python output unbuffered so test progress streams live.
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-test.txt

      - name: Install system dependencies (Qt + xvfb)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libglib2.0-0 libxkbcommon0 \
            libdbus-1-3 libfontconfig1 libxcb-cursor0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb-sync1 libxcb-xfixes0 libxcb-xinerama0 \
            libxcb-xkb1 libxkbcommon-x11-0 \
            xvfb x11-utils
          mkdir -p $XDG_RUNTIME_DIR
          chmod 700 $XDG_RUNTIME_DIR

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run test suite under xvfb
        # xvfb-run wraps the command in a virtual X server in case any
        # individual test needs a real display surface; QT_QPA_PLATFORM
        # is still 'offscreen' so most tests use that fast path.
        run: xvfb-run -a python run_tests.py

      - name: Upload coverage HTML report
        if: matrix.python-version == '3.13' && always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-linux
          path: htmlcov/
          if-no-files-found: ignore
          retention-days: 14
