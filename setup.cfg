# RNV Icon Builder — setup.cfg
# Currently used only for mutmut configuration.
# pytest, coverage, and mutmut all read their config from this file or
# their own dedicated configs (pytest.ini, .coveragerc).

[mutmut]
# Default target — change paths_to_mutate to audit a different module.
paths_to_mutate = image_adjustments.py

# Scoped runner for fast per-mutant iteration. Running the full pytest
# suite per mutant would take many hours; this targets just the relevant
# unittest class. See PHASE9_AUDIT.md for caveats.
runner = python -m pytest test_rnv_icon_builder.py -k TestImageAdjustments --benchmark-disable -x -q
tests_dir = .
