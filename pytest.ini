[pytest]
# RNV Icon Builder — pytest configuration
# Phase 1 of test-system expansion. See requirements-test.txt for dependencies.

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Declare all markers up front so --strict-markers catches typos early.
# Phases that introduce each marker are noted in parentheses.
markers =
    slow: marks tests as slow (deselect with -m "not slow")
    benchmark: performance benchmarks (Phase 8, deselect with -m "not benchmark")
    ui: UI interaction tests requiring qtbot (Phase 4)
    integration: cross-module integration tests
    snapshot: output format snapshot tests (Phase 7)
    property: hypothesis property-based tests (Phase 6)
    application: full-application tests that instantiate RNV_Icon_Builder.py (Phase 3)
    worker: background-worker / signal-emission tests (Phase 5)

# Default options:
#   -ra            — show short summary of all non-passing outcomes
#   --strict-markers — fail if an unknown marker is used
#   --tb=short     — concise traceback formatting
addopts =
    -ra
    --strict-markers
    --tb=short
